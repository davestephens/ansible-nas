---
- name: Start Traefik
  block:
    - name: Create Traefik Directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
      with_items:
        - "{{ traefik_data_directory }}"
        - "{{ traefik_data_directory }}/letsencrypt"

    - name: Template Traefik Files
      register: template_config
      tags:
        - traefik
        - traefik:template
      template:
        dest: "{{ item.dest }}"
        force: "{{ item.force | default('No') }}"
        mode: "{{ item.mode | default('0600') }}"
        src: "{{ item.src }}"
      with_items: "{{ traefik_template_files + traefik_template_files_custom | sort }}"

    - name: Traefik Docker Container
      community.docker.docker_container:
        name: traefik
        image: "{{ traefik_image }}"
        pull: true
        network_mode: host
        volumes: "{{ traefik_volumes + traefik_volumes_custom | sort }}"
        env: "{{ traefik_environment_variables }}"
        restart_policy: unless-stopped
        memory: "{{ traefik_memory }}"
        recreate: "{{ template_config is changed }}"
  when: traefik_enabled is true

- name: Stop Traefik
  block:
    - name: Stop Traefik
      community.docker.docker_container:
        name: "{{ traefik_container_name }}"
        state: absent
  when: traefik_enabled is false
